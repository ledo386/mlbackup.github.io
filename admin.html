<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <button id="themeToggle">🌙</button>
  
  <!-- NAVBAR -->
  <header>
    <div class="container nav">
      <h1>

        <a href="./index.html" class="logo">
      
          <div class="logo-container">
      
            <img 
              id="siteLogo"
              src="logoMLBclaro.png"
              alt="ML Backup Logo"
              class="logo-img"
            >
      
          </div>
      
        </a>
      
      </h1>

      <nav class="navbar-right">

        <a href="./index.html#inicio">Inicio</a>
        <a href="./index.html#servicios">Servicios</a>
        <a href="./index.html#planes">Planes</a>
        <a href="./index.html#sobre">Sobre Nosotros</a>
        <a href="./index.html#contacto">Contacto</a>

        <div id="userArea">

          <a href="./login.html" id="loginButton" class="login-btn">
            Iniciar sesión
          </a>

        </div>
      
      </nav>
    </div>
  </header>

<section class="admin-page reveal">

  <div class="container">

    <h1>Panel de administrador</h1>

    <table>

      <thead>
        <tr>
          <th>Usuario</th>
          <th>Empresa</th>
          <th>País</th>
          <th>Plan</th>
        </tr>
      </thead>

      <tbody id="adminPurchases">
      </tbody>

    </table>

  </div>

</section>

<script>

const purchases = JSON.parse(localStorage.getItem("purchases")) || [];

const table = document.getElementById("adminPurchases");

purchases.forEach(purchase => {

  table.innerHTML += `

    <tr>
      <td>${purchase.username}</td>
      <td>${purchase.company}</td>
      <td>${purchase.country}</td>
      <td>${purchase.plan}</td>
    </tr>

  `;

});

</script>

<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
