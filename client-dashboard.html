<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Backup - Panel Cliente</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <button id="themeToggle">🌙</button>
  
  <!-- NAVBAR -->
  <header>
    <div class="container nav">
      <h1>

        <a href="./index.html" class="logo">
      
          <div class="logo-container">
      
            <img id="siteLogo" src="logoMLBclaro.png" alt="ML Backup Logo" class="logo-img">
      
          </div>
      
        </a>
      
      </h1>

      <nav class="navbar-right">

        <a href="./index.html#inicio">Inicio</a>
        <a href="./index.html#servicios">Servicios</a>
        <a href="./index.html#planes">Planes</a>
        <a href="./index.html#sobre">Sobre Nosotros</a>
        <a href="./index.html#contacto">Contacto</a>

        <div id="userArea"></div>
      
      </nav>
    </div>
  </header>
  
  <section class="dashboard-page">
  
    <div class="container">
    
      <h1 class="dashboard-title">Panel Cliente</h1>
    
      <div class="dashboard-grid">
    
        <div class="dashboard-card">
        
          <h2>Estado del Sistema</h2>
        
          <p class="system-ok">
          Sistema funcionando correctamente
          </p>
        
        </div>
    
        <div class="dashboard-card">
        
          <h2>Alertas</h2>
        
          <div id="alertsContainer"></div>
        
        </div>
    
      </div>
    
      <div class="dashboard-card">
    
        <h2>Historial</h2>
      
        <table>
        
          <thead>
          
            <tr>
            
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Tamaño</th>
            
            </tr>
          
          </thead>
        
          <tbody id="historyTable"></tbody>
        
        </table>
    
      </div>
    
    </div>
  
  </section>
  
  <script>
  
    if(
      !localStorage.getItem("loggedUser")
    ){
      window.location.href =
      "./login.html";
    }
  
    if(
      localStorage.getItem("loggedUser")
      ===
      "admin"
    ){
      window.location.href =
      "./admin.html";
    }
  
    const currentUser =
    JSON.parse(
      localStorage.getItem(
        localStorage.getItem("loggedUser")
      )
    );
  
    if(
      !currentUser.plan ||
      currentUser.plan === "Ninguno"
  
    ){
      alert(
        "Debes contratar un plan."
      );
  
      window.location.href =
      "./index.html#planes";
    }
  
  </script>
  
  <script src="./monitor.js"></script>
  <script src="./dashboard.js"></script>
  <script src="./plans.js"></script>
  <script src="./backup-system.js"></script>
  <script src="./script.js"></script>

</body>
</html>
