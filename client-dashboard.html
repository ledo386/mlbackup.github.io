<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ML Backup - Panel Cliente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BARRA DE NAVEGACIÓN -->
  <header>

    <div class="container nav">
      <h1>
        <a href="./index.html" class="logo">
          <div class="logo-container">
            <img id="siteLogo" src="logoMLBclaro.png" alt="ML Backup Logo" class="logo-img">
          </div>
        </a>
      </h1>

      <nav class="navbar-right">
        <a href="./index.html#inicio">Inicio</a>
        <a href="./index.html#planes">Planes</a>
        <div id="userArea"></div>
      </nav>
    
    </div>
  
  </header>
  
  <section class="dashboard-page">
  
    <div class="container">
    
      <h1 class="dashboard-title">Panel Cliente</h1>
    
      <div class="dashboard-grid">

        <div class="dashboard-card">

          <h2>Almacenamiento</h2>
        
          <div class="storage-info">
            <span id="storageUsed">0 GB</span>
            <span id="storageLimit">/ 0 GB</span>
          </div>
        
        </div>
    
        <div class="dashboard-card">
          <h2>Alertas</h2>
          <div id="alertsContainer"></div>
        </div>
    
      </div>
    
      <div class="dashboard-card">
    
        <h2>Historial</h2>
      
        <table>
          
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Tamaño</th>
            </tr>
          </thead>
        
          <tbody id="historyTable"></tbody>
        
        </table>
    
      </div>
    
    </div>
  
  </section>
  
  <script>
  
    const clientUser = localStorage.getItem("loggedUser");
  
    // NO LOGUEADO
    if(!clientUser){
      window.location.href = "./login.html";
    }
  
    // ADMIN
    if(clientUser === "admin"){
      window.location.href = "./admin.html";
    }
  
    // DATOS USUARIO
    const clientData = JSON.parse(localStorage.getItem(clientUser));
  
    // SIN PLAN
    if(!clientData.plan || clientData.plan === "Ninguno"){
      alert("Debes contratar un plan.");
      window.location.href ="./index.html#planes";
    }
  
  </script>
  
  <script src="./monitor.js"></script>
  <script src="./dashboard.js"></script>
  <script src="./plans.js"></script>
  <script src="./backup-system.js"></script>
  <script src="./script.js"></script>

</body>
</html>
