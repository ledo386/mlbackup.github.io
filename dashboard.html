<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ML Backup | Gestión Cliente</title>

<link rel="stylesheet" href="./style.css">

</head>

<body>

<button id="themeToggle">🌙</button>

<header>

<div class="container nav">

<a href="./index.html" class="logo">

<img
id="siteLogo"
src="./logoMLBoscuro.png"
class="logo-img"
>

</a>

<nav class="navbar-right">

<a href="./admin.html">Panel Admin</a>

</nav>

</div>

</header>

<section class="dashboard-page">

<div class="container">

<h1 class="dashboard-title">

Gestión de Cliente

</h1>

<div class="dashboard-grid">

<div class="dashboard-card">

<h2>Acciones</h2>

<button onclick="runBackup()">
Ejecutar copia manual
</button>

<button onclick="restoreBackup()">
Restaurar última copia
</button>

</div>

<div class="dashboard-card">

<h2>Alertas</h2>

<div id="alertsContainer"></div>

</div>

</div>

<div class="dashboard-card">

<h2>Historial de Backups</h2>

<table>

<thead>

<tr>

<th>Fecha</th>
<th>Tipo</th>
<th>Estado</th>
<th>Tamaño</th>

</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

</section>

<script>

const loggedUser =
localStorage.getItem("loggedUser");

if(loggedUser !== "admin"){

window.location.href =
"./login.html";

}

</script>

<script src="./script.js"></script>
<script src="./backup-system.js"></script>
<script src="./monitor.js"></script>
<script src="./dashboard.js"></script>

</body>

</html>
