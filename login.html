<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <button id="themeToggle">🌙</button>
  
  <!-- NAVBAR -->
  <header>
    <div class="container nav">
      <h1>

        <a href="./index.html" class="logo">

          <div class="logo-container">

            <img 
              id="siteLogo"
              src="logoMLBclaro.png"
              alt="ML Backup Logo"
              class="logo-img"
            >

          </div>

        </a>

      </h1>

      <nav class="navbar-right">

        <a href="./index.html#inicio">Inicio</a>
        <a href="./index.html#servicios">Servicios</a>
        <a href="./index.html#planes">Planes</a>
        <a href="./index.html#sobre">Sobre Nosotros</a>
        <a href="./index.html#contacto">Contacto</a>

        <div id="userArea">

          <a href="./login.html" id="loginButton" class="login-btn">
            Iniciar sesión
          </a>

        </div>

      </nav>
    </div>
  </header>

<section class="login-page reveal">

  <div class="login-box">

    <h2>Iniciar sesión</h2>

    <form id="loginForm">

      <input type="text" id="loginUsername" placeholder="Usuario" required>

      <div class="password-box">

        <input 
          type="password"
          id="loginPassword"
          placeholder="Contraseña"
          required
        >

        <span class="toggle-password" onclick="togglePassword('loginPassword', this)">
          👁️
        </span>
      
      </div>

      <button type="submit">Iniciar sesión</button>

    </form>

    <p class="register-link">

      ¿No tienes cuenta?

      <a href="./register.html">
        Registrarse
      </a>

    </p>

    <div class="admin-info">
      <p><strong>Administrador:</strong></p>
      <p>Usuario: admin</p>
      <p>Contraseña: Admin123!</p>
    </div>

  </div>

</section>

<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
