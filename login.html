<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <button id="themeToggle">🌙</button>
  
  <!-- NAVBAR -->
  <header>
    <div class="container nav">
      <h1>

        <a href="./index.html" class="logo">
      
          <div class="logo-container">
      
            <img 
              id="siteLogo"
              src="https://uploads.onecompiler.io/44njqmhst/44nk6frt5/MLBclaro.png"
              alt="ML Backup Logo"
              class="logo-img"
            >
      
          </div>
      
        </a>
      
      </h1>

      <nav class="navbar-right">

        <a href="#inicio">Inicio</a>
        <a href="#servicios">Servicios</a>
        <a href="#planes">Planes</a>
        <a href="#sobre">Sobre Nosotros</a>
        <a href="#contacto">Contacto</a>

        <div id="userArea">

          <a href="./login.html" id="loginButton" class="login-btn">
            Iniciar sesión
          </a>

        </div>
      
      </nav>
    </div>
  </header>

<section class="login-page reveal">

  <div class="login-box">

    <h2>Iniciar sesión</h2>

    <form id="loginForm">

      <input type="text" id="loginUsername" placeholder="Usuario" required>

      <input type="password" id="loginPassword" placeholder="Contraseña" required>

      <button type="submit">Entrar</button>

    </form>

    <p class="register-link">

      ¿No tienes cuenta?
    
      <a href="./register.html">
        Registrarse
      </a>
    
    </p>

    <div class="admin-info">
      <p><strong>Administrador:</strong></p>
      <p>Usuario: admin</p>
      <p>Contraseña: Admin123!</p>
    </div>

  </div>

</section>

<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
