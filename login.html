<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ML Backup - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BARRA DE NAVEGACIÓN -->
  <header>

    <div class="container nav">
      <h1>
        <a href="./index.html" class="logo">
          <div class="logo-container">
            <img id="siteLogo" src="logoMLBclaro.png" alt="ML Backup Logo" class="logo-img">
          </div>
        </a>
      </h1>

      <nav class="navbar-right">
        <a href="./index.html#inicio">Inicio</a>
        <a href="./index.html#servicios">Servicios</a>
        <a href="./index.html#planes">Planes</a>
        <a href="./index.html#sobre">Sobre Nosotros</a>
        <a href="./index.html#contacto">Contacto</a>
        <div id="userArea"></div>
      </nav>
    
    </div>
  
  </header>

  <!-- FORMULARIO DE LOGIN -->
  <section class="login-page reveal">
  
    <div class="login-box">
  
      <h2>Iniciar sesión</h2>
  
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Usuario" required>
        <input class="password-box" type="password" id="loginPassword" placeholder="Contraseña" required>
        <button type="submit">Iniciar sesión</button>
      </form>
  
      <p class="register-link">
        ¿No tienes cuenta?
        <a href="./register.html">Registrarse</a>
      </p>
  
    </div>
  
  </section>

  <script src="./plans.js"></script>
  <script src="./auth.js"></script>
  <script src="./dashboard.js"></script>
  <script src="./monitor.js"></script>
  <script src="./script.js"></script>

</body>
</html>
